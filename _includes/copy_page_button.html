<div class="copy-md-group">
  <button class="copy-md-btn" type="button" title="Copy page as Markdown">
    <svg class="copy-md-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    <span class="copy-md-label">Copy page</span>
  </button>
  <button class="copy-md-toggle" type="button" aria-label="More options" aria-expanded="false">
    <svg class="copy-md-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <div class="copy-md-dropdown" hidden>
    <button class="copy-md-dropdown-item" type="button" data-action="copy">
      <svg class="copy-md-dropdown-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <div class="copy-md-dropdown-text">
        <span class="copy-md-dropdown-title">Copy page</span>
        <span class="copy-md-dropdown-desc">Copy page as Markdown for LLMs</span>
      </div>
    </button>
    {% assign view_md_url = page.url | replace: '.html', '' | append: '.md' | replace: '/.md', '.md' %}
    {% if page.url == '/' %}
      {% assign view_md_url = '/index.md' %}
    {% endif %}
    <a class="copy-md-dropdown-item" href="{{ view_md_url | relative_url }}" target="_blank" rel="noreferrer">
      <svg class="copy-md-dropdown-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <div class="copy-md-dropdown-text">
        <span class="copy-md-dropdown-title">View as Markdown <svg class="copy-md-external" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></span>
        <span class="copy-md-dropdown-desc">View this page as plain text</span>
      </div>
    </a>
  </div>
</div>
