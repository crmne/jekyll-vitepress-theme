name: Release

on:
  workflow_call:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: gem-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build + Publish Gem
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Read gem version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_FILE="./lib/jekyll/vitepress_theme/version.rb"
          VERSION=$(ruby -r "$VERSION_FILE" -e "puts Jekyll::VitePressTheme::VERSION" 2>/dev/null)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract VERSION from $VERSION_FILE" >&2
            exit 1
          fi
          echo "Local version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches gem version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "Tag $TAG does not match gem version $VERSION." >&2
            exit 1
          fi

      - name: Check if version needs publishing
        id: check_version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          GEM_NAME="jekyll-vitepress-theme"
          echo "Fetching published versions for '$GEM_NAME'..."

          ALL_PUBLISHED_VERSIONS=$( \
            ( \
              gem list ^${GEM_NAME}$ -r --all 2>/dev/null || true
              gem list ^${GEM_NAME}$ -r --prerelease 2>/dev/null || true
            ) | sed -n 's/.*(\(.*\)).*/\1/p' \
              | tr ',' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d' \
              | sort -u \
          )

          if echo "$ALL_PUBLISHED_VERSIONS" | grep -Fxq "$VERSION"; then
            echo "Verdict: Version $VERSION already published."
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Verdict: Version $VERSION is new."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build gem package
        if: steps.check_version.outputs.version_changed == 'true'
        run: gem build jekyll-vitepress-theme.gemspec

      - name: Publish gem to RubyGems
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_AUTH_TOKEN }}"
          GEM_VERSION: "${{ steps.version.outputs.version }}"
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GEM_HOST_API_KEY}" ]]; then
            echo "RUBYGEMS_AUTH_TOKEN is not configured."
            exit 1
          fi

          mkdir -p "$HOME/.gem"
          cat > "$HOME/.gem/credentials" <<EOF
          ---
          :rubygems_api_key: ${GEM_HOST_API_KEY}
          EOF
          chmod 0600 "$HOME/.gem/credentials"

          gem_file="jekyll-vitepress-theme-${GEM_VERSION}.gem"
          output=$(gem push "${gem_file}" 2>&1) || {
            echo "$output"
            if echo "$output" | grep -q "Repushing of gem versions is not allowed"; then
              echo "Version already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }
          echo "$output"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="v${VERSION}"
          release_target="$GITHUB_SHA"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            tag_sha=$(git rev-list -n 1 "${TAG}")
            if [ "$tag_sha" != "$GITHUB_SHA" ] && [ "${{ steps.check_version.outputs.version_changed }}" = "true" ]; then
              echo "Tag ${TAG} already exists at ${tag_sha}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
            release_target="$tag_sha"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists."
            exit 0
          fi

          prerelease_args=()
          if ruby -rrubygems/version -e 'exit Gem::Version.new(ARGV.fetch(0)).prerelease? ? 0 : 1' "$VERSION"; then
            prerelease_args=(--prerelease)
          fi

          previous_tag=$(git tag --sort=-v:refname --list 'v*' | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${release_target}"
          else
            commit_range="$release_target"
          fi

          commits=$(git log --reverse --format='* %H %s' "$commit_range" | grep -Ev '^\* [0-9a-f]+ (docs|test|chore):' || true)
          if [ -z "$commits" ]; then
            commits=$(git log --reverse --format='* %H %s' "$commit_range")
          fi

          {
            echo "## Changelog"
            echo "$commits"
            if [ -n "$previous_tag" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG}"
            fi
          } > release-notes.md

          gh release create "$TAG" \
            --target "$release_target" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"
