title: Jekyll VitePress Theme
description: VitePress-style documentation theme for Jekyll.
lang: en-US
timezone: UTC
# This repo's docs site keeps its own include overrides outside gem payload.
includes_dir: docs/_includes

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty

theme: jekyll-vitepress-theme

collections:
  introduction:
    output: true
    permalink: "/:name/"
  core_features:
    output: true
    permalink: "/:name/"
  advanced:
    output: true
    permalink: "/:name/"
  reference:
    output: true
    permalink: "/:name/"

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: introduction
    values:
      layout: default
  - scope:
      type: core_features
    values:
      layout: default
  - scope:
      type: advanced
    values:
      layout: default
  - scope:
      type: reference
    values:
      layout: default

jekyll_vitepress:
  branding:
    site_title: Jekyll VitePress
    logo:
      default: /assets/images/theme/vitepress-logo-mini.svg
      light: /assets/images/theme/vitepress-logo-mini.svg
      dark: /assets/images/theme/vitepress-logo-mini.svg
      alt: VitePress
      width: 24
      height: 24
  typography:
    body_font_family: "'Inter', ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'"
    code_font_family: "ui-monospace, 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace"
    google_fonts_url: "https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
  syntax:
    light_theme: github
    dark_theme: github.dark
  footer:
    enabled: true
    show_on_docs: false
    message: >-
      Brought to you by <a href="https://paolino.me" target="_blank" rel="noreferrer">Carmine Paolino</a>, maker of
    copyright: >-
      <span class="footer-brand-links"><a href="https://chatwithwork.com" class="footer-chatwithwork-link" target="_blank" rel="noreferrer"><img class="footer-chatwithwork-logo" src="https://chatwithwork.com/logotype.svg" alt="Chat with Work"></a><a href="https://rubyllm.com" class="footer-rubyllm-link" target="_blank" rel="noreferrer"><img class="footer-rubyllm-logo theme-image light" src="https://rubyllm.com/assets/images/logotype.svg" alt="RubyLLM"><img class="footer-rubyllm-logo theme-image dark" src="https://rubyllm.com/assets/images/logotype_dark.svg" alt="RubyLLM"></a></span><br><span class="footer-built-with">Docs built with <a href="https://jekyll-vitepress.dev" target="_blank" rel="noreferrer">Jekyll VitePress</a>.</span>
  doc_footer:
    enabled: true
    previous_label: Previous page
    next_label: Next page
  last_updated:
    enabled: true
    text: Last updated
    format: "%-d %b %Y, %H:%M"
  edit_link:
    enabled: true
    pattern: "https://github.com/crmne/jekyll-vitepress-theme/edit/master/:path"
    text: Edit this page on GitHub
  github_star:
    enabled: true
    repository: crmne/jekyll-vitepress-theme
    text: Star
    show_count: true
  github_sponsor:
    enabled: true
    user: crmne
    text: Sponsor
  labels:
    outline: On this page
    sidebar_menu: Menu
    return_to_top: Return to top
    skip_to_content: Skip to content
    appearance_menu: Appearance
    switch_to_dark: Switch to dark theme
    switch_to_light: Switch to light theme
  behavior:
    scroll_offset: 134

plugins:
  - jekyll-vitepress-theme
  - jekyll-redirect-from

exclude:
  - _site
  - .jekyll-cache
  - vendor
  - node_modules
  - scripts
  - lib
  - "*.gem"
  - jekyll-vitepress-theme.gemspec
  - Gemfile
  - Gemfile.lock
